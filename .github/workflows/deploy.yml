name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26.3.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore previous URL list
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: /tmp/indexnow-urls.json
          key: indexnow-urls-${{ github.ref_name }}

      - name: Build
        run: pnpm run build

      - name: Submit URLs to IndexNow
        continue-on-error: true
        run: node scripts/submit-indexnow.mjs --previous-urls /tmp/indexnow-urls.json --save-urls /tmp/indexnow-urls.json

      - name: Save current URL list
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/indexnow-urls.json
          key: indexnow-urls-${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
